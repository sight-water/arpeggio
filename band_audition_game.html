<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arpeggio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF8F1;--card:#fff;--ink:#241D16;--muted:#7A6C5B;--line:#DDD3C0;--line2:#ECE4D4;
  --r:#BE4A2C;--m:#2E7D6B;--h:#C2882A;--accent:#9A2C1E;--warn:#7A3000;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Zen Kaku Gothic New",sans-serif;color:var(--ink);
  background:radial-gradient(130% 90% at 50% -10%,#3a352f,#211e1b 70%);
  min-height:100vh;padding:14px 10px 60px;font-size:14px;}
.wrap{max-width:900px;margin:0 auto;}
.sheet{background:var(--paper);border-radius:6px;padding:16px 16px 22px;box-shadow:0 18px 50px rgba(0,0,0,.45);}
h1{font-family:"RocknRoll One";font-size:26px;letter-spacing:.01em;line-height:1;}
h1 .a{color:var(--accent);}
.kick{font-size:9px;letter-spacing:.4em;color:var(--accent);font-weight:700;text-transform:uppercase;}
h2{font-size:13px;font-weight:900;margin:14px 0 7px;letter-spacing:.03em;display:flex;align-items:center;gap:6px;}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;}
.r{color:var(--r);}.m{color:var(--m);}.h{color:var(--h);}
.bg-r{background:var(--r);}.bg-m{background:var(--m);}.bg-h{background:var(--h);}
.muted{color:var(--muted);}
.row{display:flex;flex-wrap:wrap;gap:8px;}
button{font-family:inherit;font-size:13px;cursor:pointer;border:1.5px solid var(--ink);
  background:var(--card);color:var(--ink);border-radius:5px;padding:7px 12px;font-weight:700;transition:.12s;}
button:hover{background:var(--ink);color:var(--paper);}
button:disabled{opacity:.32;cursor:not-allowed;}
button.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
button.ghost{border-style:dashed;font-weight:500;}
button.big{padding:10px 18px;font-size:14px;}

/* ===== member cards ===== */
.mkt{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
.mem{border:1.5px solid var(--line);background:var(--card);border-radius:6px;
  padding:7px 8px 30px;width:132px;position:relative;cursor:default;transition:transform .12s,box-shadow .12s;}
.mem.click{border-color:var(--ink);cursor:pointer;}
.mem.click:hover{box-shadow:0 4px 0 var(--accent);transform:translateY(-2px);}
.mem.cant-afford{opacity:.5;}
.mem.new-type{border-color:var(--m);background:#f5fdf8;}
.mem.risky-peeked{border-color:var(--r);background:#fff8f7;}
.mem .mname{font-size:11.5px;font-weight:900;letter-spacing:.02em;margin-bottom:1px;}
.mem .inst{font-size:12px;font-weight:700;color:var(--muted);}
.mem .stats{font-size:11px;font-weight:700;margin:3px 0 2px;letter-spacing:.02em;}
.mem .cost{font-size:10px;font-weight:700;margin-bottom:3px;}
.mem .sk{font-size:10px;line-height:1.4;}
.mem .closed{font-size:10px;color:var(--muted);}
.mem .risk{color:var(--accent);font-weight:700;}
.detail-btn{position:absolute;bottom:5px;right:6px;font-size:10px;padding:2px 6px;
  border-radius:8px;border-color:var(--line);color:var(--muted);font-weight:500;background:var(--paper);}
.detail-btn:hover{background:var(--ink);color:var(--paper);}

/* ===== race track ===== */
.race-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.race-track{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:8px 10px;}
.race-label{font-size:11px;font-weight:900;letter-spacing:.04em;margin-bottom:6px;
  display:flex;justify-content:space-between;align-items:baseline;}
.race-formula{font-size:10px;font-weight:400;color:var(--muted);}
.race-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--line2);font-size:12px;}
.race-row:last-child{border-bottom:none;}
.race-rank{font-weight:900;font-size:11px;width:22px;flex-shrink:0;color:var(--muted);}
.race-name{flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.race-score{font-weight:900;font-size:13px;min-width:36px;text-align:right;}
.race-pts{font-size:10px;min-width:28px;text-align:right;}
.race-row.race-you{background:#F3ECDC;border-radius:4px;padding:3px 4px;}
.race-row.race-you .race-name{color:var(--accent);}

/* ===== judge & pool ===== */
.top-panels{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.judge-panel{background:var(--card);border:1px solid var(--h);border-radius:6px;padding:8px 10px;}
.judge-title{font-size:10px;font-weight:900;letter-spacing:.08em;color:var(--h);margin-bottom:5px;text-transform:uppercase;}
.judge-card-item{font-size:11.5px;margin-bottom:3px;}
.judge-card-item .jn{font-weight:900;}
.judge-card-item .jd{color:var(--muted);font-size:10.5px;}
.info-panel{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:8px 10px;}
.token-pool{font-size:12px;font-weight:700;display:flex;gap:10px;align-items:center;margin-bottom:6px;}
.pool-label{font-size:10px;color:var(--muted);font-weight:500;}
.pool-bar{height:6px;background:var(--line2);border-radius:3px;margin-top:2px;overflow:hidden;}
.pool-fill{height:100%;border-radius:3px;}
.studio-row{display:flex;gap:6px;margin-bottom:4px;}
.studio-label{font-size:10px;font-weight:700;width:60px;flex-shrink:0;display:flex;align-items:center;}

/* ===== draft phase ===== */
.draft-section{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:12px;margin-top:10px;}
.draft-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line2);font-size:13px;}
.draft-row:last-child{border-bottom:none;}
.draft-seat{font-weight:700;min-width:80px;}
.draft-inst{font-size:12px;color:var(--muted);}
.draft-inst.picked{color:var(--ink);font-weight:700;}
.turn-order-note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6;padding:6px 10px;
  background:#F3ECDC;border-radius:4px;}

/* ===== band ===== */
.band{border:1.5px solid var(--line);border-radius:6px;padding:9px 10px;margin-bottom:6px;background:var(--card);}
.band.you{border-color:var(--accent);border-width:2px;}
.band .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.band .nm{font-weight:900;}
.band .lead{font-size:10.5px;color:var(--muted);}
.pw{display:flex;gap:10px;font-weight:900;font-size:13px;}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.chip{font-size:10.5px;border:1px solid var(--line);border-radius:10px;padding:1px 7px;background:var(--paper);}
.chip.you{background:#F3ECDC;}

/* ===== log ===== */
.log{background:#231d16;color:#e8ddc9;border-radius:6px;padding:8px 11px;font-size:11.5px;
  line-height:1.7;max-height:110px;overflow-y:auto;margin-top:10px;}
.log div{opacity:.8;}.log div:last-child{opacity:1;font-weight:700;}
.log .you{color:#f0d878;}.log .bot{color:#9ec4a0;}.log .sys{color:#a0b8d8;font-style:italic;}

/* ===== banner ===== */
.banner{background:var(--ink);color:var(--paper);border-radius:6px;padding:9px 12px;font-weight:700;
  display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
.banner .t{font-family:"RocknRoll One";font-size:15px;}
.banner.last{background:var(--warn);}
.turn-bar{height:5px;background:rgba(255,255,255,.15);border-radius:3px;margin-top:7px;overflow:hidden;width:100%;}
.turn-fill{height:100%;background:rgba(255,255,255,.6);border-radius:3px;transition:width .4s ease;}

/* ===== scout reveal modal ===== */
.reveal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;
  align-items:center;justify-content:center;z-index:300;padding:16px;}
.reveal-card{background:var(--paper);border-radius:12px;padding:22px;max-width:320px;width:100%;
  text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.6);}
.reveal-header{font-size:12px;color:var(--muted);margin-bottom:4px;}
.reveal-name{font-family:"RocknRoll One";font-size:22px;margin-bottom:12px;}
.reveal-skills{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.skill-row{border-radius:8px;padding:10px 14px;text-align:left;}
.skill-row.open-row{background:#e8f4ec;border:1px solid #b0d8bc;}
.skill-row.closed-row.good{background:#d4f0e0;border:1px solid #8ecfaa;animation:flipReveal .5s ease-out;}
.skill-row.closed-row.bad{background:#fce8e4;border:1px solid #e4a89a;animation:flipReveal .5s ease-out;}
.skill-row-label{font-size:9px;font-weight:900;letter-spacing:.1em;color:var(--muted);
  text-transform:uppercase;margin-bottom:3px;}
.skill-row-name{font-weight:900;font-size:15px;}
.skill-row-desc{font-size:11px;color:var(--muted);margin-top:2px;}
@keyframes flipReveal{0%{transform:rotateY(90deg);opacity:0;}100%{transform:rotateY(0);opacity:1;}}

/* ===== detail modal ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;
  align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal-box{background:var(--paper);border-radius:10px;padding:18px;max-width:340px;width:100%;
  box-shadow:0 24px 64px rgba(0,0,0,.5);animation:modalIn .2s ease-out;}
@keyframes modalIn{from{opacity:0;transform:scale(.93) translateY(8px);}to{opacity:1;transform:none;}}
.sdp-head{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.sdp-name{font-family:"RocknRoll One";font-size:20px;}
.sdp-inst{font-size:13px;color:var(--muted);}
.sdp-close{margin-left:auto;font-size:12px;padding:3px 8px;border-radius:8px;}
.sdp-stats{display:flex;gap:12px;font-weight:900;font-size:15px;margin-bottom:6px;}
.sdp-cost{font-size:12px;font-weight:700;margin-bottom:12px;}
.sdp-section{margin-bottom:10px;}
.sdp-sec-label{font-size:10px;font-weight:900;letter-spacing:.1em;color:var(--muted);
  text-transform:uppercase;margin-bottom:4px;}
.sdp-row{border:1px solid var(--line2);border-radius:6px;padding:8px 10px;background:var(--card);}
.sdp-row .sn{font-weight:900;font-size:13px;}
.sdp-row .sd{font-size:11px;color:var(--muted);margin-bottom:4px;}
.sdp-row .sa{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:10px;display:inline-block;margin-top:2px;}
.sdp-row.good .sa{background:#d4f0e0;color:#1a5c3a;}
.sdp-row.inactive .sa{background:#f0ece4;color:var(--muted);}
.sdp-row.bad .sa{background:#fce8e4;color:#8a1a0a;}
.sdp-row.risk-row{border-color:var(--r);}
.sdp-scout{width:100%;margin-top:14px;background:var(--accent);color:#fff;border-color:var(--accent);font-size:14px;}
.sdp-scout:hover{background:#7a1a10;}

/* ===== toast & anim ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);
  background:#231d16;color:#e8ddc9;border-radius:20px;padding:8px 18px;
  font-size:13px;font-weight:700;opacity:0;transition:opacity .25s,transform .25s;
  z-index:400;max-width:85vw;text-align:center;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.t-scout{background:var(--m);color:#fff;}
.toast.t-practice-r{background:var(--r);color:#fff;}
.toast.t-practice-m{background:var(--m);color:#fff;}
.toast.t-warn{background:var(--warn);color:#fff;}
@keyframes chipIn{from{opacity:0;transform:scale(.7) translateY(6px);}to{opacity:1;transform:none;}}

/* ===== audition reveal ===== */
@keyframes revealPop{from{opacity:0;transform:scale(.85) translateY(14px);}to{opacity:1;transform:none;}}
@keyframes revealSlide{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes progFill{from{width:0%;}to{width:100%;}}
.aud-stage{padding:4px 0;}
.aud-opener{text-align:center;padding:48px 0 32px;}
.aud-big-title{font-family:"RocknRoll One";font-size:40px;letter-spacing:6px;color:var(--accent);animation:revealPop .7s ease both;}
.aud-big-sub{font-size:13px;color:var(--muted);margin:10px 0 28px;}
.aud-step-ttl{font-size:16px;font-weight:900;margin:12px 0 10px;animation:revealPop .4s ease both;}
.aud-cards{display:grid;gap:8px;margin-bottom:8px;}
.aud-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;}
.aud-card.you-card{border-color:var(--h);}
.aud-card.win-card{border-color:gold;background:#18160a;}
.aud-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.aud-card-name{font-weight:900;font-size:14px;}
.aud-card-sub{font-size:11px;color:var(--muted);}
.aud-row{font-size:12px;padding:4px 0;border-top:1px solid var(--border);display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.aud-row.reveal-in{animation:revealSlide .35s ease both;}
.aud-lbl{color:var(--muted);font-size:11px;min-width:44px;}
.aud-plus{color:#2E7D6B;font-weight:700;}
.aud-minus{color:#BE4A2C;font-weight:700;}
.aud-rank{display:inline-block;padding:0 6px;border-radius:8px;font-size:10px;font-weight:700;margin:0 2px;}
.rank-1{background:#f5c842;color:#000;}.rank-2{background:#c0c0c0;color:#000;}
.rank-3{background:#cd7f32;color:#fff;}.rank-x{background:var(--border);color:var(--muted);}
.aud-prog-wrap{height:3px;background:var(--border);border-radius:2px;margin:8px 0 4px;overflow:hidden;}
.aud-prog-fill{height:100%;background:var(--accent);animation:progFill linear both;}
.aud-skip{font-size:11px;color:var(--muted);cursor:pointer;background:none;border:none;padding:2px 0;text-decoration:underline;}
.aud-winner{text-align:center;padding:16px 0 8px;animation:revealPop .8s ease both;}
.aud-winner-you{font-size:22px;font-weight:900;color:var(--accent);}
.aud-winner-name{font-size:26px;font-weight:900;color:gold;text-shadow:0 0 20px rgba(255,200,0,.4);}

table{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px;}
th,td{padding:5px 6px;text-align:center;border-bottom:1px solid var(--line2);}
th{font-weight:900;border-bottom:1.5px solid var(--line);}
td.l,th.l{text-align:left;}
tr.win td{background:#F3ECDC;font-weight:900;}
.note{font-size:11px;color:var(--muted);line-height:1.5;margin-top:6px;}

/* ===== roulette ===== */
.roulette-box{text-align:center;padding:20px 16px 10px;}
.roulette-slot{display:inline-flex;align-items:center;justify-content:center;
  font-family:"RocknRoll One";font-size:42px;min-width:220px;height:76px;
  background:var(--card);border:3px solid var(--line);border-radius:12px;margin-bottom:10px;}
.roulette-slot.spinning{border-color:var(--accent);animation:slotBounce .12s ease-in-out infinite;}
.roulette-slot.done{border-color:var(--accent);color:var(--accent);}
@keyframes slotBounce{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.07);}}
.roulette-sub{font-size:12px;color:var(--muted);margin-bottom:12px;}
.order-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0 2px;}
.order-chip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;
  background:var(--card);border:1.5px solid var(--line);}
.order-chip.you{background:#F3ECDC;border-color:var(--accent);color:var(--accent);}
.draft-row.you-row{background:#F3ECDC;border-radius:4px;padding:6px 8px;}

/* ===== bot action banner ===== */
.bot-banner{position:fixed;top:0;left:0;right:0;z-index:500;
  background:rgba(26,22,18,.93);color:#e8ddc9;padding:10px 16px;
  display:flex;align-items:center;gap:12px;
  animation:banSlide .22s ease-out;}
@keyframes banSlide{from{transform:translateY(-100%);}to{transform:translateY(0);}}
.ban-ico{font-size:24px;width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ban-who{font-size:10px;font-weight:700;color:#9ec4a0;margin-bottom:1px;}
.ban-act{font-family:"RocknRoll One";font-size:15px;line-height:1.2;}
.ban-sub{font-size:11px;color:rgba(232,220,201,.6);margin-top:1px;}
.ban-prog{height:2px;background:rgba(255,255,255,.12);margin-top:7px;border-radius:1px;overflow:hidden;}
.ban-fill{height:100%;background:rgba(255,255,255,.45);border-radius:1px;}

/* ===== band member chips ===== */
.bmems{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.bmem{font-size:10.5px;border:1px solid var(--line);border-radius:8px;
  padding:2px 7px;background:var(--paper);line-height:1.5;}
.bmem.you-mem{background:#F3ECDC;border-color:#c9a870;}
.bmem .bi{font-weight:700;}
.bmem .bsk{color:var(--muted);}
.bmem .bsk.risk{color:var(--r);font-weight:700;}

@media(max-width:560px){.mem{width:calc(50% - 4px);}.race-wrap{grid-template-columns:1fr;}.top-panels{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="modal-container"></div>
<div class="wrap"><div class="sheet" id="app"></div></div>
<script>
"use strict";

/* ====== CONFIG ====== */
const CONFIG = {
  turns: 14,
  bandCap: 6,
  practiceGain: 2,
  song1: {h:2, m:1},
  song2: {r:2, m:1},
  placement: {2:[3,0], 3:[5,2,0], 4:[5,3,1,0], 5:[5,3,2,1,0]},
  tokenPoolBase: 20,
  stageFrightProb: 0.5,
  stageFrightPenalty: 2,
  costs: {
    vocal:    {r:0, m:4},
    guitar:   {r:0, m:3},
    bass:     {r:3, m:0},
    cajon:    {r:4, m:0},
    keyboard: {r:2, m:2},
  },
  judgeBonus: {
    rhythm_lover: 1,
    big_band:     2,
    surprise:     2,
    hard_work:    1,
    vocal_fan:    1,
    harmony_fan:  1,
  },
};

/* ====== DATA ====== */
const INST = {
  vocal:    {label:"ボーカル",   r:0, m:3, h:1},
  guitar:   {label:"ギター",     r:0, m:3, h:1},
  bass:     {label:"ベース",     r:2, m:0, h:1},
  cajon:    {label:"カホン",     r:3, m:0, h:1},
  keyboard: {label:"キーボード", r:0, m:1, h:3},
};
const INST_KEYS = Object.keys(INST);

// 山札構成 合計38枚
const DECK_COMP = {guitar:13, vocal:8, bass:7, keyboard:6, cajon:4};

const SKILLS = {
  enjoy:        {n:"エンジョイ勢",   d:"特殊効果なし",              risk:false},
  harmonizer:   {n:"ハモり上手",     d:"高さ+1",                    risk:false},
  big_ensemble: {n:"大編成向き",     d:"5人以上で横+2",             risk:false},
  precision:    {n:"精密機械",       d:"縦+1",                      risk:false},
  veteran:      {n:"経験者",         d:"担当軸+2",                  risk:false},
  own_world:    {n:"独自世界",       d:"全項目+2",                  risk:false},
  stage_weak:   {n:"本番に弱い",     d:"50%で縦・横−2",             risk:true},
  misfit:       {n:"はみ出し者",     d:"4人以上なら担当軸−2",      risk:true},
  home_living:  {n:"実家暮らし",     d:"練習トークン+1",            risk:false},
  quit_member:  {n:"資格勉強中",     d:"スカウト無効・場から消える", risk:true},
};
const SKILL_KEYS = Object.keys(SKILLS);
// 出現頻度: 最多=5, 多=3, 小=2, 最小=1
const SKILL_POOL = [
  ...Array(5).fill("enjoy"),
  ...Array(3).fill("harmonizer"),
  ...Array(3).fill("big_ensemble"),
  ...Array(3).fill("precision"),
  ...Array(3).fill("veteran"),
  ...Array(3).fill("own_world"),
  ...Array(2).fill("misfit"),
  ...Array(2).fill("stage_weak"),
  ...Array(1).fill("home_living"),
  ...Array(1).fill("quit_member"),
];

const JUDGE_CARDS = {
  rhythm_lover: {n:"リズム重視",     d:"Song2 1位に"},
  big_band:     {n:"大バンド好き",   d:"メンバー数最多に"},
  surprise:     {n:"サプライズ枠",   d:"楽器種類最多に"},
  hard_work:    {n:"実力主義",       d:"練習回数最多に"},
  vocal_fan:    {n:"ボーカル推し",   d:"ボーカル持ちに"},
  harmony_fan:  {n:"ハーモニー好き", d:"Song1 1位に"},
};
const JUDGE_KEYS = Object.keys(JUDGE_CARDS);

const NAMES = [
  "アキ","ナナ","リク","ソラ","コウ","ミオ","レイ","ユウ","カナ","ハル",
  "ショウ","ツバサ","マイ","ケン","アヤ","タイチ","ノア","ヒナ","ルイ","ゼン",
  "モモ","タク","ミサ","コト","ジン","ラン","ユキ","ハジメ","サクラ","ダイ",
  "リン","ミズキ","カイ","ナオ","セイ","ヒロ","ノブ","マコト","イオ","タキ",
];

/* ====== RNG ====== */
function mulberry32(a){
  return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};
}
function pick(arr){return arr[Math.floor(state.rng()*arr.length)];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(state.rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ====== STATE ====== */
let state={};

function poolSize(pc){return Math.max(CONFIG.tokenPoolBase,pc*4+6);}
function primary(inst){return inst==="cajon"||inst==="bass"?"r":inst==="keyboard"?"h":"m";}
function allInsts(b){return [b.instrument,...b.members.map(x=>x.instrument)];}
function bSize(b){return b.members.length+1;}

/* ====== SETUP → DRAFT ====== */
function newSetup(){
  state={phase:"setup",rng:mulberry32(Math.random()*1e9|0),setup:{count:3}};
  render();
}

function goDraft(){
  const s=state.setup;
  const seed=Math.random()*1e9|0;
  state={
    phase:"draft", seed, rng:mulberry32(seed),
    playerCount:s.count,
    judgeCards:[],
    draftInsts:{},
    botArchetypes:{},
    lastSetup:s,
    spinPhase:"idle",spinCurrentDisplay:null,spinFrames:[],spinFrameIdx:0,
    draftOrder:[],draftStep:0,humanDraftPos:-1,
  };
  const jk=[...JUDGE_KEYS]; shuffle(jk);
  state.judgeCards=[jk[0],jk[1]];
  const arches=["wide","narrow","balanced","random"];
  for(let i=1;i<s.count;i++) state.botArchetypes[i]=arches[(i-1)%arches.length];
  render();
}

function selectInstrument(inst){
  state.draftInsts[0]=inst;
  const taken=new Set([inst]);
  for(let seat=1;seat<state.playerCount;seat++){
    const avail=INST_KEYS.filter(k=>!taken.has(k));
    if(!avail.length) break;
    const arch=state.botArchetypes[seat];
    let choice;
    if(arch==="narrow") choice=avail.find(k=>k==="cajon")||avail.find(k=>k==="bass")||avail[0];
    else if(arch==="wide") choice=avail.find(k=>k==="vocal")||avail.find(k=>k==="guitar")||avail[0];
    else if(arch==="balanced") choice=avail.find(k=>k==="keyboard")||avail[0];
    else choice=avail[Math.floor(state.rng()*avail.length)];
    state.draftInsts[seat]=choice;
    taken.add(choice);
  }
  render();
}

/* ====== START GAME ====== */
function makeBand(seat,nm,you,inst,arch){
  return{seat,name:nm,you,instrument:inst,archetype:arch,
    members:[],tokens:{r:0,m:0},practiceCount:0};
}

function startGame(){
  const d=state;
  const ng={
    phase:"play", seed:d.seed, rng:d.rng,
    playerCount:d.playerCount,
    round:0,
    tokenPool:{r:poolSize(d.playerCount),m:poolSize(d.playerCount)},
    judgeCards:d.judgeCards,
    log:[],detailCard:null,lastAction:null,scoutReveal:null,
    peekUsed:false,peekMode:false,botBanner:null,
    bands:[],deck:[],market:[],results:null,
    lastSetup:d.lastSetup,
    botArchetypes:d.botArchetypes,
    draftOrder:d.draftOrder||[],
  };
  state=ng;

  // 山札作成（楽器別枚数指定）
  let id=0;
  Object.entries(DECK_COMP).forEach(([inst,count])=>{
    for(let i=0;i<count;i++){
      const sk=[...SKILL_POOL];shuffle(sk);
      ng.deck.push({id,name:NAMES[id%NAMES.length],instrument:inst,open:sk[0],closed:sk[1],peeked:false});
      id++;
    }
  });
  shuffle(ng.deck);

  // バンド作成（ドラフト楽器を使用）
  for(let seat=0;seat<d.playerCount;seat++){
    const inst=d.draftInsts[seat];
    const arch=seat===0?"human":d.botArchetypes[seat];
    const name=seat===0?"あなた":"相手"+String.fromCharCode(64+seat);
    ng.bands.push(makeBand(seat,name,seat===0,inst,arch));
  }

  // マーケット初期配置
  for(let i=0;i<d.playerCount+2;i++) ng.market.push(ng.deck.pop());

  log("ゲーム開始（seed "+d.seed+"）","sys");
  log("審査員："+ng.judgeCards.map(k=>JUDGE_CARDS[k].n).join("・"),"sys");
  log("手番順（ドラフト逆順）："+ng.bands.slice().reverse().map(b=>b.name).join(" → "),"sys");
  render();
}

function log(t,cls=""){state.log.push({t,cls});}

/* ====== ENGINE ====== */
function canAfford(b,cost){return b.tokens.r>=cost.r&&b.tokens.m>=cost.m;}

function basePowers(b){
  const P={r:0,m:0,h:0};
  allInsts(b).forEach(i=>{P.r+=INST[i].r;P.m+=INST[i].m;P.h+=INST[i].h;});
  P.r+=b.tokens.r;P.m+=b.tokens.m;
  return P;
}

function openSkillDelta(b){
  const P={r:0,m:0,h:0};
  const sz=bSize(b);
  const hasR=allInsts(b).some(i=>i==="cajon"||i==="bass");
  b.members.forEach(mem=>{
    switch(mem.open){
      case"harmonizer":   P.h+=1; break;
      case"big_ensemble": if(sz>=5) P.m+=2; break;
      case"precision":    P.r+=1; break;
      case"veteran":      P[primary(mem.instrument)]+=2; break;
      case"own_world":    P.r+=2;P.m+=2;P.h+=2; break;
    }
  });
  return P;
}

function closedSkillDelta(b){
  const P={r:0,m:0,h:0};
  const sz=bSize(b);
  const hasR=allInsts(b).some(i=>i==="cajon"||i==="bass");
  b.members.forEach(mem=>{
    switch(mem.closed){
      case"harmonizer":   P.h+=1; break;
      case"big_ensemble": if(sz>=5) P.m+=2; break;
      case"precision":    P.r+=1; break;
      case"veteran":      P[primary(mem.instrument)]+=2; break;
      case"own_world":    P.r+=2;P.m+=2;P.h+=2; break;
      case"stage_weak":
        if(state.rng()<CONFIG.stageFrightProb){P.r-=CONFIG.stageFrightPenalty;P.m-=CONFIG.stageFrightPenalty;}
        break;
      case"misfit": if(sz>=4) P[primary(mem.instrument)]-=2; break;
    }
  });
  return P;
}

function projPowers(b){
  const bp=basePowers(b),sk=openSkillDelta(b);
  return{r:bp.r+sk.r,m:bp.m+sk.m,h:bp.h+sk.h};
}
function projSong(b,song){
  const P=projPowers(b);
  return Math.round((song.r||0)*P.r+(song.m||0)*P.m+(song.h||0)*P.h);
}
function songScore(b,song){
  const bp=basePowers(b),sk=openSkillDelta(b),cl=closedSkillDelta(b);
  const P={r:bp.r+sk.r+cl.r,m:bp.m+sk.m+cl.m,h:bp.h+sk.h+cl.h};
  return Math.round((song.r||0)*P.r+(song.m||0)*P.m+(song.h||0)*P.h);
}

function makePlacement(scores){
  const tbl=CONFIG.placement[state.playerCount]||[];
  const sorted=[...scores].sort((a,b_)=>b_.score-a.score);
  const pts={};sorted.forEach((s,i)=>pts[s.seat]=tbl[i]??0);
  return pts;
}

function judgeBonus(band,s1rank,s2rank){
  let bonus=0;
  state.judgeCards.forEach(k=>{
    const val=CONFIG.judgeBonus[k]||0;
    switch(k){
      case"rhythm_lover": if(s2rank===0) bonus+=val; break;
      case"harmony_fan":  if(s1rank===0) bonus+=val; break;
      case"big_band":{
        const mx=Math.max(...state.bands.map(b=>bSize(b)));
        if(bSize(band)===mx) bonus+=val; break;
      }
      case"surprise":{
        const myT=new Set(allInsts(band)).size;
        const mx=Math.max(...state.bands.map(b=>new Set(allInsts(b)).size));
        if(myT===mx) bonus+=val; break;
      }
      case"hard_work":{
        const mx=Math.max(...state.bands.map(b=>b.practiceCount));
        if(band.practiceCount===mx) bonus+=val; break;
      }
      case"vocal_fan":
        if(allInsts(band).includes("vocal")) bonus+=val; break;
    }
  });
  return bonus;
}

function runAudition(){
  // closedSkillDelta uses RNG — compute once per band per song, preserving order
  function calcScore(f,song){
    return Math.round((song.r||0)*f.r+(song.m||0)*f.m+(song.h||0)*f.h);
  }
  const s1details=state.bands.map(b=>{
    const base=basePowers(b),open=openSkillDelta(b),closed=closedSkillDelta(b);
    const f={r:base.r+open.r+closed.r,m:base.m+open.m+closed.m,h:base.h+open.h+closed.h};
    return{seat:b.seat,base,open,closed,score:calcScore(f,CONFIG.song1)};
  });
  const s2details=state.bands.map(b=>{
    const base=basePowers(b),open=openSkillDelta(b),closed=closedSkillDelta(b);
    const f={r:base.r+open.r+closed.r,m:base.m+open.m+closed.m,h:base.h+open.h+closed.h};
    return{seat:b.seat,base,open,closed,score:calcScore(f,CONFIG.song2)};
  });
  const s1=s1details.map(d=>({seat:d.seat,score:d.score}));
  const s2=s2details.map(d=>({seat:d.seat,score:d.score}));
  const p1=makePlacement(s1),p2=makePlacement(s2);
  const s1s=[...s1].sort((a,b)=>b.score-a.score);
  const s2s=[...s2].sort((a,b)=>b.score-a.score);
  const totals=state.bands.map(b=>{
    const r1=s1s.findIndex(x=>x.seat===b.seat);
    const r2=s2s.findIndex(x=>x.seat===b.seat);
    const base=(p1[b.seat]||0)+(p2[b.seat]||0);
    const jb=judgeBonus(b,r1,r2);
    return{seat:b.seat,base,jb,total:base+jb};
  });
  const maxT=Math.max(...totals.map(t=>t.total));
  const tied=totals.filter(t=>t.total===maxT);
  let winner;
  if(tied.length===1){winner=tied[0].seat;}
  else{
    const ms=tied.map(t=>({seat:t.seat,mel:projPowers(state.bands[t.seat]).m}));
    const mx=Math.max(...ms.map(x=>x.mel));
    const mt=ms.filter(x=>x.mel===mx);
    winner=mt[Math.floor(state.rng()*mt.length)].seat;
  }
  state.results={s1,s2,p1,p2,totals,winner,s1details,s2details,revealStep:0};
  state.phase="audition";render();
}

function advanceReveal(){
  if(state.phase!=="audition"||!state.results) return;
  if(state.results.revealStep>=6) return;
  state.results.revealStep++;
  render();
  // auto-advance delays per step (0=manual, then ms per step)
  const delays=[0, 3000, 3000, 3500, 3500, 2500, 0];
  const d=delays[state.results.revealStep];
  if(d) setTimeout(advanceReveal,d);
}

/* ====== ACTIONS ====== */
function refill(){
  while(state.market.length<state.playerCount+2&&state.deck.length)
    state.market.push(state.deck.pop());
}

function doScout(b,mem){
  const cost=CONFIG.costs[mem.instrument];
  state.market=state.market.filter(x=>x.id!==mem.id);
  // 資格勉強中: スカウト無効・場から消える（コスト返還）
  if(mem.closed==="quit_member"){
    refill();
    if(b.you){
      state.scoutReveal={name:mem.name,inst:INST[mem.instrument].label,open:mem.open,closed:mem.closed};
    }
    log(b.name+"が"+mem.name+"をスカウトしようとしたが断られた（資格勉強中）",b.you?"you":"bot");
    return;
  }
  b.tokens.r-=cost.r; b.tokens.m-=cost.m;
  state.tokenPool.r+=cost.r; state.tokenPool.m+=cost.m;
  b.members.push(mem);
  refill();
  if(b.you){
    state.lastAction={type:"scout",memberId:mem.id,name:mem.name,inst:INST[mem.instrument].label};
    state.scoutReveal={name:mem.name,inst:INST[mem.instrument].label,open:mem.open,closed:mem.closed};
  }
  log(b.name+"が"+mem.name+"（"+INST[mem.instrument].label+"）をスカウト",b.you?"you":"bot");
}

function doPractice(b,axis){
  const hasHomeLiving=b.members.some(m=>m.open==="home_living"||m.closed==="home_living");
  const gain=Math.min(CONFIG.practiceGain+(hasHomeLiving?1:0),state.tokenPool[axis]);
  if(gain<=0){log((axis==="r"?"A":"B")+"スタジオが満員（プール枯渇）","sys");return false;}
  state.tokenPool[axis]-=gain;
  b.tokens[axis]+=gain;
  b.practiceCount++;
  if(b.you) state.lastAction={type:"practice",axis,gain};
  log(b.name+"が"+(axis==="r"?"A":"B")+"スタジオで練習（+"+ gain+"トークン）",b.you?"you":"bot");
  return true;
}

function endPlayerTurn(){
  state.peekMode=false;
  const actions=[];
  const botTurnOrder=[...state.draftOrder].reverse().filter(s=>s!==0);
  for(const s of botTurnOrder){
    const b=state.bands[s];
    const prevMC=b.members.length,prevR=b.tokens.r,prevM=b.tokens.m;
    applyBot(b);
    if(b.members.length>prevMC)
      actions.push({type:"scout",band:b,mem:b.members[b.members.length-1]});
    else if(b.tokens.r>prevR)
      actions.push({type:"practice",band:b,axis:"r",gain:b.tokens.r-prevR});
    else if(b.tokens.m>prevM)
      actions.push({type:"practice",band:b,axis:"m",gain:b.tokens.m-prevM});
  }
  state.round++;
  if(state.round>=CONFIG.turns){runAudition();return;}
  if(actions.length) showBotBanners(actions,0);
  else render();
}

/* ====== BOT ====== */
function botTarget(b){
  const mkt=state.market.filter(()=>bSize(b)<CONFIG.bandCap);
  if(!mkt.length||bSize(b)>=CONFIG.bandCap) return null;
  const a=b.archetype;
  const have=new Set(allInsts(b));
  if(a==="wide") return mkt.find(m=>!have.has(m.instrument))||mkt[0];
  if(a==="narrow"){
    if(b.members.length>=3) return null;
    return mkt.find(m=>m.instrument==="cajon")||mkt.find(m=>m.instrument==="bass")||mkt[0];
  }
  if(a==="balanced"){
    if(b.members.length>=4) return null;
    return mkt.find(m=>!have.has(m.instrument))||mkt[0];
  }
  return state.rng()<0.4?mkt[Math.floor(state.rng()*mkt.length)]:null;
}
function botPrefAxis(b){
  const a=b.archetype;
  if(a==="narrow") return"r";
  if(a==="wide") return b.tokens.r>b.tokens.m?"m":"r";
  if(a==="balanced") return b.tokens.r<=b.tokens.m?"r":"m";
  return state.rng()<0.5?"r":"m";
}
function applyBot(b){
  const want=botTarget(b);
  if(want){
    const cost=CONFIG.costs[want.instrument];
    if(canAfford(b,cost)){doScout(b,want);return;}
    const needR=Math.max(0,cost.r-b.tokens.r),needM=Math.max(0,cost.m-b.tokens.m);
    const axis=needR>needM?"r":"m";
    if(state.tokenPool[axis]>0){doPractice(b,axis);return;}
    const other=axis==="r"?"m":"r";
    if(state.tokenPool[other]>0){doPractice(b,other);return;}
    return;
  }
  const axis=botPrefAxis(b);
  if(state.tokenPool[axis]>0){doPractice(b,axis);return;}
  const other=axis==="r"?"m":"r";
  if(state.tokenPool[other]>0) doPractice(b,other);
}

/* ====== ROULETTE ====== */
function startSpin(){
  if(state.spinPhase!=="idle") return;
  // ドラフト順をシャッフルで決定
  const seats=Array.from({length:state.playerCount},(_,i)=>i);
  for(let i=seats.length-1;i>0;i--){
    const j=Math.floor(state.rng()*(i+1));
    [seats[i],seats[j]]=[seats[j],seats[i]];
  }
  state.draftOrder=seats;
  state.humanDraftPos=seats.indexOf(0);
  state.draftStep=0;
  // スロットは「あなたが何番目か」の数字を回す
  const pos1=state.humanDraftPos+1;
  const nums=Array.from({length:state.playerCount},(_,i)=>String(i+1));
  const fakes=[];
  for(let i=0;i<18;i++) fakes.push(nums[Math.floor(Math.random()*nums.length)]);
  fakes.push(String(pos1),String(pos1),String(pos1));
  state.spinFrames=fakes;state.spinFrameIdx=0;state.spinCurrentDisplay=fakes[0];
  state.spinPhase="spinning";
  render();
  setTimeout(nextSpinFrame,60);
}
function nextSpinFrame(){
  if(state.spinPhase!=="spinning") return;
  const idx=++state.spinFrameIdx;
  const total=state.spinFrames.length;
  if(idx>=total){
    setTimeout(processDraftStep,700);
    return;
  }
  state.spinCurrentDisplay=state.spinFrames[idx];
  render();
  const pct=idx/total;
  const delay=pct<0.45?65:pct<0.7?110:pct<0.85?190:pct<0.95?310:420;
  setTimeout(nextSpinFrame,delay);
}
function botPickInst(seat){
  const taken=new Set(Object.values(state.draftInsts));
  const avail=INST_KEYS.filter(k=>!taken.has(k));
  if(!avail.length) return;
  const arch=state.botArchetypes[seat];
  let choice;
  if(arch==="narrow") choice=avail.find(k=>k==="cajon")||avail.find(k=>k==="bass")||avail[0];
  else if(arch==="wide") choice=avail.find(k=>k==="vocal")||avail.find(k=>k==="guitar")||avail[0];
  else if(arch==="balanced") choice=avail.find(k=>k==="keyboard")||avail[0];
  else choice=avail[Math.floor(state.rng()*avail.length)];
  state.draftInsts[seat]=choice;
}
function processDraftStep(){
  if(state.draftStep>=state.playerCount){
    state.spinPhase="done";render();return;
  }
  const seat=state.draftOrder[state.draftStep];
  if(seat===0){
    state.spinPhase="waiting_human";render();
  } else {
    state.spinPhase="bot_picking";render();
    setTimeout(()=>{botPickInst(seat);state.draftStep++;processDraftStep();},600);
  }
}

/* ====== BOT BANNER ====== */
function renderBotBanner(){
  if(!state.botBanner) return'';
  const{ico,title,sub,progress}=state.botBanner;
  return`<div class="bot-banner">
    <div class="ban-ico">${ico}</div>
    <div style="flex:1;min-width:0">
      <div class="ban-who">${title.replace(/が.*$/,"")}</div>
      <div class="ban-act">${title}</div>
      <div class="ban-sub">${sub}</div>
      <div class="ban-prog"><div class="ban-fill" id="ban-fill" style="width:${progress||0}%"></div></div>
    </div>
  </div>`;
}
function showBotBanners(actions,idx){
  if(idx>=actions.length){state.botBanner=null;render();return;}
  const a=actions[idx];
  let ico,title,sub;
  if(a.type==="scout"){
    ico="🎸";title=a.band.name+"がスカウト！";
    sub=a.mem.name+"（"+INST[a.mem.instrument].label+"）を加入";
  } else {
    ico=a.axis==="r"?"🥁":"🎵";title=a.band.name+"が練習";
    sub=(a.axis==="r"?"縦":"横")+" +"+a.gain+"トークン";
  }
  state.botBanner={ico,title,sub,progress:0};
  render();
  const start=Date.now(),dur=1400;
  function tick(){
    const p=Math.min(100,(Date.now()-start)/dur*100);
    const el=document.getElementById("ban-fill");
    if(el) el.style.width=p+"%";
    state.botBanner.progress=p;
    if(p<100) requestAnimationFrame(tick);
    else showBotBanners(actions,idx+1);
  }
  requestAnimationFrame(tick);
}

/* ====== UI HELPERS ====== */
function skillEffectInfo(skillKey,mem,sz,hasR){
  const pri=primary(mem.instrument);
  const pn=pri==="r"?"縦":pri==="m"?"横":"高さ";
  switch(skillKey){
    case"enjoy":        return{cls:"inactive",txt:"特殊効果なし"};
    case"harmonizer":   return{cls:"good",txt:"✓ 高さ+1"};

    case"precision":    return{cls:"good",txt:"✓ 縦+1"};
    case"veteran":      return{cls:"good",txt:`✓ ${pn}+2`};
    case"own_world":    return{cls:"good",txt:"✓ 全項目+2"};
    case"stage_weak":   return{cls:"bad",txt:"⚠ 本番50%で縦・横−2"};
    case"misfit":       return sz>=4?{cls:"bad",txt:`⚠ ${pn}−2（発動）`}:{cls:"inactive",txt:`4人以上で${pn}−2`};
    case"home_living":  return{cls:"good",txt:"✓ 練習トークン+1"};
    case"quit_member":  return{cls:"bad",txt:"⚠ スカウト無効・場から消える"};
  }
  return{cls:"inactive",txt:""};
}
function pwStr(P){return`<span class="r">縦${P.r}</span> <span class="m">横${P.m}</span> <span class="h">高${P.h}</span>`;}
function membChips(b,revealClosed){
  const isSelf=b.you;
  const selfChip=`<span class="bmem${isSelf?' you-mem':''}"><span class="bi">（${isSelf?"自分":b.name}）${INST[b.instrument].label}</span></span>`;
  const mems=b.members.map(m=>{
    const c=SKILLS[m.closed];
    const closedHtml=revealClosed
      ?`<span class="bsk${c.risk?' risk':''}"> 隠:${c.n}</span>`
      :`<span class="bsk muted"> 隠:？</span>`;
    return`<span class="bmem${isSelf?' you-mem':''}"><span class="bi">${m.name}・${INST[m.instrument].label}</span><span class="bsk"> 表:${SKILLS[m.open].n}</span>${closedHtml}</span>`;
  });
  return`<div class="bmems">${selfChip}${mems.join('')}</div>`;
}
function costStr(inst){
  const c=CONFIG.costs[inst];const parts=[];
  if(c.r>0) parts.push(`<span class="r">縦×${c.r}</span>`);
  if(c.m>0) parts.push(`<span class="m">横×${c.m}</span>`);
  return parts.join("+");
}

function memCard(mem,opts){
  const i=INST[mem.instrument];
  let cl="mem";
  if(opts.clickScout||opts.clickPeek) cl+=" click";
  if(opts.cantAfford) cl+=" cant-afford";
  if(opts.newType) cl+=" new-type";
  if(mem.peeked&&SKILLS[mem.closed].risk) cl+=" risky-peeked";
  const closedHtml=mem.peeked
    ?`<div class="sk${SKILLS[mem.closed].risk?' risk':''}">👁 隠:<b>${SKILLS[mem.closed].n}</b></div>`
    :`<div class="closed muted">隠: ？（スカウトで公開）</div>`;
  const action=opts.clickPeek?'peek-card':'scout';
  return`<div class="${cl}" data-mid="${mem.id}"${(opts.clickScout||opts.clickPeek)?` data-action="${action}"`:""}>
    <div class="mname">${mem.name}</div>
    <div class="inst">${i.label}</div>
    <div class="stats"><span class="r">縦${i.r}</span> <span class="m">横${i.m}</span> <span class="h">高${i.h}</span></div>
    <div class="cost">コスト：${costStr(mem.instrument)}</div>
    <div class="sk">表:<b>${SKILLS[mem.open].n}</b></div>
    ${closedHtml}
    ${!opts.clickPeek?`<button class="detail-btn" data-action="opendetail" data-mid="${mem.id}">詳細</button>`:''}
  </div>`;
}

/* ====== RENDER ====== */
function render(){
  const app=document.getElementById("app");
  if(state.phase==="setup") app.innerHTML=renderSetup();
  else if(state.phase==="draft") app.innerHTML=renderDraft();
  else if(state.phase==="play") app.innerHTML=renderPlay();
  else app.innerHTML=renderAudition();
  const logEl=app.querySelector(".log");if(logEl) logEl.scrollTop=logEl.scrollHeight;
  renderOverlay();
  afterRender();
}

function renderOverlay(){
  const mc=document.getElementById("modal-container");if(!mc) return;
  if(state.scoutReveal){mc.innerHTML=renderRevealModal();return;}
  if(state.phase==="play"&&state.detailCard!==null){
    const mem=state.market.find(m=>m.id===state.detailCard);
    if(!mem){state.detailCard=null;mc.innerHTML="";return;}
    mc.innerHTML=renderDetailModal(mem,state.bands[0]);return;
  }
  mc.innerHTML="";
}

function renderSetup(){
  const s=state.setup;
  const counts=[2,3,4,5].map(n=>`<button class="${s.count===n?"sel":""}" data-action="count" data-n="${n}">${n}人</button>`).join("");
  return`<div class="kick">Band Audition</div>
    <h1><span class="a">Arpeggio</span></h1>
    <p class="note">練習でトークンを貯め、コストを払ってメンバーをスカウト。2曲のオーディションで競り勝つ。</p>
    <h2><span class="dot bg-r"></span>人数</h2>
    <div class="row">${counts}</div>
    <div class="row" style="margin-top:14px">
      <button class="big" data-action="godraft">次へ →</button>
    </div>`;
}

function renderDraft(){
  const phase=state.spinPhase||"idle";
  const archNames={wide:"大編成型",narrow:"少数精鋭型",balanced:"バランス型",random:"ランダム型"};

  let draftSection;

  if(phase==="idle"){
    draftSection=`<div class="roulette-box">
      <div class="roulette-slot">？</div>
      <div class="roulette-sub">ルーレットでドラフト順が決まります</div>
      <button class="big" data-action="spin">🎲 ルーレットを回す！</button>
    </div>`;

  } else if(phase==="spinning"){
    draftSection=`<div class="roulette-box">
      <div class="roulette-slot spinning">${state.spinCurrentDisplay||"?"}</div>
      <div class="roulette-sub" style="color:var(--accent)">🎲 あなたのドラフト順を抽選中…</div>
    </div>`;

  } else {
    // bot_picking / waiting_human / done
    const rows=state.draftOrder.map((seat,i)=>{
      const isHuman=seat===0;
      const nm=isHuman?"あなた":`相手${String.fromCharCode(64+seat)}（${archNames[state.botArchetypes[seat]]||""}）`;
      const inst=state.draftInsts[seat];
      const isCurrent=i===state.draftStep&&phase!=="done";
      let statusTxt;
      if(inst) statusTxt=INST[inst].label+"　縦"+INST[inst].r+" 横"+INST[inst].m+" 高"+INST[inst].h;
      else if(isCurrent) statusTxt=isHuman?"← 選んでください":"選択中…";
      else statusTxt="待機中";
      return`<div class="draft-row${isHuman?" you-row":""}">
        <span class="draft-seat" style="${isCurrent?"color:var(--accent);font-weight:900":""}">${i+1}. ${nm}</span>
        <span class="draft-inst${inst?" picked":""}">${statusTxt}</span>
      </div>`;
    }).join("");

    const humanPick=phase==="waiting_human"?(()=>{
      const taken=new Set(Object.values(state.draftInsts));
      const btns=INST_KEYS.map(k=>{
        const ok=!taken.has(k);
        return`<button ${ok?`data-action="human-pick" data-k="${k}"`:"disabled"}>
          ${INST[k].label}<br>
          <span style="font-size:10px;font-weight:500">縦${INST[k].r} 横${INST[k].m} 高${INST[k].h}</span>
        </button>`;
      }).join("");
      return`<div style="margin-top:12px">
        <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px">🎸 あなたの番！楽器を選んでください</div>
        <div class="row">${btns}</div>
      </div>`;
    })():"";

    const turnOrderNote=phase==="done"?(()=>{
      const to=[...state.draftOrder].reverse();
      return`<div class="turn-order-note" style="margin-top:8px">
        <b>手番順（ドラフト逆順）：</b>
        <div class="order-row">${to.map((s,i)=>{
          const n=s===0?"あなた":"相手"+String.fromCharCode(64+s);
          return`<span class="order-chip${s===0?" you":""}">${i+1}. ${n}</span>`;
        }).join("")}</div>
      </div>`;
    })():"";

    draftSection=`<div class="draft-section">${rows}</div>${humanPick}${turnOrderNote}`;
  }

  const startBtn=phase==="done"?`<button class="big" data-action="startgame">ゲームを始める →</button>`:"";

  return`<div class="kick">Band Audition</div>
    <h1><span class="a">Arpeggio</span></h1>

    <h2><span class="dot bg-h"></span>今回の審査員（全員に公開）</h2>
    <div class="draft-section" style="border-color:var(--h)">
      ${state.judgeCards.map(k=>`<div class="judge-card-item">
        <span class="jn">${JUDGE_CARDS[k].n}</span>
        <span class="jd"> — ${JUDGE_CARDS[k].d} <b>+${CONFIG.judgeBonus[k]}pt</b></span>
      </div>`).join("")}
    </div>

    <h2 style="margin-top:14px"><span class="dot bg-r"></span>ドラフト</h2>
    ${draftSection}
    <div class="row" style="margin-top:14px">${startBtn}</div>`;
}

function renderJudge(){
  return`<div class="judge-panel">
    <div class="judge-title">今回の審査員</div>
    ${state.judgeCards.map(k=>`<div class="judge-card-item">
      <span class="jn">${JUDGE_CARDS[k].n}</span>

function renderPlay(){
  const you=state.bands[0];
  const turnNo=state.round+1;
  const isLast=turnNo>=CONFIG.turns;
  const pct=Math.round(state.round/CONFIG.turns*100);
  const yourTypes=new Set(allInsts(you));
  const hasHomeLiving=you.members.some(m=>m.open==="home_living"||m.closed==="home_living");
  const practiceGain=CONFIG.practiceGain+(hasHomeLiving?1:0);
  const canR=state.tokenPool.r>0;
  const canM=state.tokenPool.m>0;
  const P=projPowers(you);

  const market=state.market.map(mem=>{
    const cost=CONFIG.costs[mem.instrument];
    const afford=canAfford(you,cost);
    const clickScout=!state.peekMode&&afford&&bSize(you)<CONFIG.bandCap;
    const clickPeek=state.peekMode&&!mem.peeked;
    return memCard(mem,{clickScout,cantAfford:!afford&&!state.peekMode,newType:!yourTypes.has(mem.instrument),clickPeek});
  }).join("");
  const canScout=state.market.some(m=>canAfford(you,CONFIG.costs[m.instrument])&&bSize(you)<CONFIG.bandCap);
  const stuck=!canR&&!canM&&!canScout;

  const opps=state.bands.slice(1).map(b=>{
    const bp=projPowers(b);
    return`<div class="band">
      <div class="top">
        <span><span class="nm">${b.name}</span> <span class="lead">${INST[b.instrument].label} ${bSize(b)}人</span></span>
        <div class="pw">${pwStr(bp)}</div>
      </div>
      ${membChips(b,true)}
    </div>`;
  }).join("");

  return`${renderBotBanner()}<div class="banner ${isLast?"last":""}">
    <div style="flex:1">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="t">${isLast?"⚠ ラスト手番！":"手番"} ${turnNo} / ${CONFIG.turns}</span>
        <span style="font-size:11px;opacity:.7">seed ${state.seed}</span>
      </div>
      <div class="turn-bar"><div class="turn-fill" style="width:${pct}%"></div></div>
    </div>
  </div>

  <div class="top-panels">${renderJudge()}${renderInfoPanel()}</div>
  ${renderRaceTrack()}

  <h2><span class="dot bg-h"></span>場のメンバー
    <span class="muted" style="font-size:11px;font-weight:500">山札残 ${state.deck.length}枚　緑枠＝新楽器タイプ</span>
    ${state.peekMode
      ?`<span style="color:var(--m);font-weight:700;font-size:11px;margin-left:8px">👁 覗くメンバーをタップ</span><button data-action="cancel-peek" style="font-size:10px;padding:2px 8px;margin-left:6px">キャンセル</button>`
      :!state.peekUsed
        ?`<button data-action="start-peek" style="font-size:10px;padding:2px 8px;margin-left:6px">👁 覗き（残1回）</button>`
        :`<span class="muted" style="font-size:10px;margin-left:6px">覗き使用済</span>`
    }
  </h2>
  <div class="mkt">${market}</div>

  <h2><span class="dot bg-r"></span>あなたのバンド</h2>
  <div class="band you">
    <div class="top">
      <span><span class="nm">あなた</span> <span class="lead">${INST[you.instrument].label}・${bSize(you)}/${CONFIG.bandCap}人</span></span>
      <div class="pw">${pwStr(P)}</div>
    </div>
    ${membChips(you,true)}
  </div>

  <div class="studio-row" style="margin-top:8px;align-items:stretch;gap:8px;display:flex;flex-wrap:wrap;">
    <button class="big" style="flex:1;min-width:160px;border-color:var(--r);${canR?"":"opacity:.4"}"
      data-action="practice" data-axis="r" ${canR?"":"disabled"}>
      🥁 Aスタジオで練習<br>
      <span style="font-size:11px;font-weight:500">縦トークン +${Math.min(practiceGain,state.tokenPool.r)}　プール残${state.tokenPool.r}</span>
    </button>
    <button class="big" style="flex:1;min-width:160px;border-color:var(--m);${canM?"":"opacity:.4"}"
      data-action="practice" data-axis="m" ${canM?"":"disabled"}>
      🎸 Bスタジオで練習<br>
      <span style="font-size:11px;font-weight:500">横トークン +${Math.min(practiceGain,state.tokenPool.m)}　プール残${state.tokenPool.m}</span>
    </button>
  </div>
  ${stuck?`<button class="big" style="margin-top:8px;width:100%;opacity:.7;border-style:dashed" data-action="pass">
    😴 休憩（プール枯渇・合法手なし）<br>
    <span style="font-size:11px;font-weight:500">手番をパスします</span>
  </button>`:''}


  <h2><span class="dot bg-m"></span>対戦相手</h2>
  ${opps}

  <div class="log">${state.log.map(l=>`<div class="${l.cls||""}">${l.t}</div>`).join("")}</div>`;

function renderAudition(){
  const r=state.results;
  const step=r.revealStep;

  // Step 0: Opening
  if(step===0){
    return`<div class="aud-stage">
      <div class="aud-opener">
        <div class="aud-big-title">🎸 AUDITION</div>
        <div class="aud-big-sub">${state.playerCount}バンド・${CONFIG.turns}手番の戦いが終わった</div>
        <button class="big" style="font-size:15px;letter-spacing:2px;padding:14px 32px" data-action="reveal-next">
          ▶　開幕！
        </button>
      </div>
    </div>`;
  }

  // helpers
  const an=(n)=>step===n?"reveal-in":""; // animate only when first revealed
  const dv=(n)=>n>0?`<b class="aud-plus">+${n}</b>`:n<0?`<b class="aud-minus">${n}</b>`:`<span style="color:var(--muted)">±0</span>`;
  const rc=(rank)=>{
    const cls=["rank-1","rank-2","rank-3","rank-x"][Math.min(rank,3)];
    return`<span class="aud-rank ${cls}">${rank+1}位</span>`;
  };
  const s1ranks=[...r.s1].sort((a,b)=>b.score-a.score);
  const s2ranks=[...r.s2].sort((a,b)=>b.score-a.score);

  const cards=state.bands.map((b,bi)=>{
    const d1=r.s1details.find(d=>d.seat===b.seat);
    const d2=r.s2details.find(d=>d.seat===b.seat);
    const tot=r.totals.find(t=>t.seat===b.seat);
    const r1=s1ranks.findIndex(x=>x.seat===b.seat);
    const r2=s2ranks.findIndex(x=>x.seat===b.seat);
    const isWin=b.seat===r.winner;
    const delay=`animation-delay:${bi*90}ms`;

    // step1: base powers
    const baseRow=step>=1?`<div class="aud-row ${an(1)}" style="${delay}">
      <span class="aud-lbl">基礎</span>
      <span class="r">縦${d1.base.r}</span>&nbsp;<span class="m">横${d1.base.m}</span>&nbsp;<span class="h">高${d1.base.h}</span>
    </div>`:"";

    // step2: open skill delta
    const sk={r:d1.open.r,m:d1.open.m,h:d1.open.h};
    const skRow=step>=2?`<div class="aud-row ${an(2)}" style="${delay}">
      <span class="aud-lbl">スキル</span>
      ${dv(sk.r)}<span class="aud-lbl">縦</span>
      ${dv(sk.m)}<span class="aud-lbl">横</span>
      ${dv(sk.h)}<span class="aud-lbl">高</span>
    </div>`:"";

    // step3: Song1 (closed delta may show stage_weak effect)
    const cl1={r:d1.closed.r,m:d1.closed.m,h:d1.closed.h};
    const cl1tag=(cl1.r||cl1.m||cl1.h)?`<span style="font-size:10px;color:var(--muted);margin-left:4px">隠${cl1.r?dv(cl1.r)+"縦":""}${cl1.m?dv(cl1.m)+"横":""}${cl1.h?dv(cl1.h)+"高":""}</span>`:"";
    const s1Row=step>=3?`<div class="aud-row ${an(3)}" style="${delay}">
      <span class="aud-lbl">Song1</span>${cl1tag}
      <b>${d1.score}点</b>${rc(r1)}<span class="aud-lbl">→</span><b>${r.p1[b.seat]??0}pt</b>
    </div>`:"";

    // step4: Song2
    const cl2={r:d2.closed.r,m:d2.closed.m,h:d2.closed.h};
    const cl2tag=(cl2.r||cl2.m||cl2.h)?`<span style="font-size:10px;color:var(--muted);margin-left:4px">隠${cl2.r?dv(cl2.r)+"縦":""}${cl2.m?dv(cl2.m)+"横":""}${cl2.h?dv(cl2.h)+"高":""}</span>`:"";
    const s2Row=step>=4?`<div class="aud-row ${an(4)}" style="animation-delay:${bi*90+40}ms">
      <span class="aud-lbl">Song2</span>${cl2tag}
      <b>${d2.score}点</b>${rc(r2)}<span class="aud-lbl">→</span><b>${r.p2[b.seat]??0}pt</b>
    </div>`:"";

    // step5: judge bonus
    const jbRow=step>=5?`<div class="aud-row ${an(5)}" style="${delay}">
      <span class="aud-lbl">審査員</span>
      ${tot.jb>0?`<b class="aud-plus">+${tot.jb}pt</b>`:`<span style="color:var(--muted)">なし</span>`}
    </div>`:"";

    // step6: total
    const totRow=step>=6?`<div class="aud-row ${an(6)}" style="animation-delay:${bi*100}ms;font-size:14px;font-weight:900;border-top:2px solid var(--border);margin-top:2px">
      <span class="aud-lbl">合計</span>
      <span style="font-size:17px">${tot.total}pt</span>
      ${isWin?`<span style="color:gold;margin-left:6px;font-size:16px">🏆</span>`:""}
    </div>`:"";

    return`<div class="aud-card${b.you?" you-card":""}${isWin&&step>=6?" win-card":""}">
      <div class="aud-card-head">
        <span class="aud-card-name">${b.you?"あなた":b.name}</span>
        <span class="aud-card-sub">${INST[b.instrument].label}・${bSize(b)}人</span>
      </div>
      ${baseRow}${skRow}${s1Row}${s2Row}${jbRow}${totRow}
    </div>`;
  }).join("");

  const stepTitles=["","🥁 各バンドの基礎点","✨ スキル効果（オープン）","🎵 Song1 結果","🎶 Song2 結果","⭐ 審査員ボーナス","🏆 最終結果"];

  // progress bar + skip (steps 1-5)
  const delays=[0,3000,3000,3500,3500,2500,0];
  const ctrl=step<6?`<div class="aud-prog-wrap"><div class="aud-prog-fill" style="animation-duration:${delays[step]}ms"></div></div>
    <button class="aud-skip" data-action="reveal-next">次へスキップ →</button>`:"";

  // winner section (step 6)
  const winnerSec=step>=6?(()=>{
    const w=state.bands[r.winner];
    return`<div class="aud-winner">
      ${r.winner===0
        ?`<div class="aud-winner-you">🎸 あなたの優勝！</div>`
        :`<div style="font-size:12px;color:var(--muted)">優勝</div><div class="aud-winner-name">${w.name}</div>`}
    </div>`;
  })():"";

  // band details + note + again (step 6)
  const details=step>=6?`<h2 style="margin-top:14px">バンド詳細</h2>
    ${state.bands.map(b=>{
      const P=projPowers(b);
      return`<div class="band${b.you?" you":""}">
        <div class="top">
          <span><span class="nm">${b.you?"あなた":b.name}</span> <span class="lead">${INST[b.instrument].label} ${bSize(b)}人</span></span>
          <div class="pw">${pwStr(P)}</div>
        </div>
        ${membChips(b,true)}
      </div>`;
    }).join("")}
    <p class="note" style="margin-top:4px">
      順位点：${CONFIG.placement[state.playerCount].map((p,i)=>`${i+1}位${p}pt`).join("・")}
      　審査員：${state.judgeCards.map(k=>JUDGE_CARDS[k].n+"（"+JUDGE_CARDS[k].d+"+"+CONFIG.judgeBonus[k]+"pt）").join("・")}
    </p>
    <div class="row" style="margin-top:14px"><button class="big" data-action="again">もう一度</button></div>`:"";

  const bannerBg=step>=6&&r.winner===0?"background:#1a5c3a":"";
  const bannerTxt=step>=6?(r.winner===0?"🎸 あなたの優勝！":"優勝："+state.bands[r.winner].name):"🎵 オーディション進行中";

  return`<div class="aud-stage">
    <div class="banner" style="${bannerBg}"><div class="t">${bannerTxt}</div></div>
    ${winnerSec}
    <div class="aud-step-ttl">${stepTitles[step]}</div>
    <div class="aud-cards">${cards}</div>
    ${ctrl}
    ${details}
  </div>`;
}

/* ====== TOAST & ANIM ====== */
let _toastTimer=null;
function showToast(msg,cls=""){
  let el=document.getElementById("_toast");
  if(!el){el=document.createElement("div");el.id="_toast";el.className="toast";document.body.appendChild(el);}
  clearTimeout(_toastTimer);
  el.textContent=msg;el.className="toast "+(cls||"");
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add("show")));
  _toastTimer=setTimeout(()=>el.classList.remove("show"),2200);
}

function afterRender(){
  const la=state.lastAction;if(!la)return;state.lastAction=null;
  if(la.type==="scout") showToast(la.name+"（"+la.inst+"）をスカウト！","t-scout");
  if(la.type==="practice"){
    showToast((la.axis==="r"?"Aスタジオ 縦":"Bスタジオ 横")+" +"+la.gain,"t-practice-"+la.axis);
    const btn=document.querySelector(`button[data-action="practice"][data-axis="${la.axis}"]`);
    if(btn&&la.gain>0){
      const el=document.createElement("div");el.textContent="+"+la.gain;
      el.style.cssText=`position:fixed;color:${la.axis==="r"?"#BE4A2C":"#2E7D6B"};font-weight:900;font-size:22px;pointer-events:none;z-index:9999;text-shadow:0 2px 6px rgba(0,0,0,.3)`;
      const rect=btn.getBoundingClientRect();
      el.style.left=(rect.left+rect.width/2-14)+"px";el.style.top=(rect.top-4)+"px";
      document.body.appendChild(el);
      el.animate([{opacity:1,transform:"translateY(0) scale(1)"},{opacity:0,transform:"translateY(-52px) scale(1.4)"}],
        {duration:900,easing:"cubic-bezier(.2,0,.8,1)"}).onfinish=()=>el.remove();
    }
  }
}

/* ====== EVENTS ====== */
document.addEventListener("click",e=>{
  const el=e.target.closest("[data-action]");if(!el) return;
  const act=el.dataset.action;

  // setup
  if(act==="count"){state.setup.count=+el.dataset.n;render();return;}
  if(act==="godraft"){goDraft();return;}
  // draft
  if(act==="spin"){startSpin();return;}
  if(act==="human-pick"){
    state.draftInsts[0]=el.dataset.k;
    state.draftStep++;
    processDraftStep();
    return;
  }
  if(act==="startgame"){startGame();return;}
  // audition reveal
  if(act==="reveal-next"){advanceReveal();return;}
  // reset
  if(act==="again"){
    state={phase:"setup",rng:mulberry32(Math.random()*1e9|0),setup:state.lastSetup||{count:3}};
    render();return;
  }
  // reveal
  if(act==="confirm-reveal"){state.scoutReveal=null;endPlayerTurn();return;}

  if(state.phase!=="play") return;

  if(act==="start-peek"){state.peekMode=true;render();return;}
  if(act==="cancel-peek"){state.peekMode=false;render();return;}
  if(act==="peek-card"){
    const mid=+el.closest("[data-mid]").dataset.mid;
    const mem=state.market.find(m=>m.id===mid);
    if(!mem)return;
    mem.peeked=true;state.peekMode=false;state.peekUsed=true;
    showToast(mem.name+" 隠スキル："+SKILLS[mem.closed].n,SKILLS[mem.closed].risk?"t-warn":"t-scout");
    render();return;
  }
  if(act==="pass"){
    log("あなたが休憩（合法手なし）","you");
    endPlayerTurn();return;
  }
  if(act==="practice"){
    doPractice(state.bands[0],el.dataset.axis);
    endPlayerTurn();return;
  }
  if(act==="scout"){
    const mid=+el.closest("[data-mid]").dataset.mid;
    const mem=state.market.find(m=>m.id===mid);
    const you=state.bands[0];
    if(!mem||bSize(you)>=CONFIG.bandCap) return;
    if(!canAfford(you,CONFIG.costs[mem.instrument])){showToast("トークンが足りません","t-warn");return;}
    doScout(you,mem);
    render(); // reveal モーダルを先に表示、confirm-reveal で endPlayerTurn
    return;
  }
  if(act==="scout-from-modal"){
    const mid=+el.dataset.mid;
    const mem=state.market.find(m=>m.id===mid);
    const you=state.bands[0];
    if(!mem||!canAfford(you,CONFIG.costs[mem.instrument])) return;
    state.detailCard=null;
    doScout(you,mem);
    render();return;
  }
  if(act==="opendetail"){if(state.peekMode)return;state.detailCard=+el.dataset.mid;renderOverlay();return;}
  if(act==="closedetail"){state.detailCard=null;renderOverlay();return;}
});

newSetup();
</script>
